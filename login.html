<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar · Comunidade Imersão Claude</title>
<meta name="description" content="Acesso à comunidade da Imersão Claude.">
<meta name="robots" content="noindex">
<link rel="icon" href="logo-escuro.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="corpo-login">

<!-- Mesmo fundo de partículas do site -->
<canvas id="bg" class="bg-canvas"></canvas>
<div class="bg-scrim"></div>

<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-google" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8"/><path d="M8 12h8"/></symbol>
  <symbol id="i-arrow-right" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></symbol>
</svg>

<main class="login-palco">
  <div class="login-cartao liquid-glass-strong">
    <img class="login-logo" src="logo-escuro.svg" alt="" width="56" height="56">

    <h1>imersão claude</h1>
    <p class="login-sub">
      A comunidade de quem está construindo <em>de verdade</em> com o Claude.
    </p>

    <button class="pill btn-conta login-botao" id="btn-entrar" type="button">
      <svg class="ic ic-sm"><use href="#i-google"/></svg>
      <span>Entrar com Google</span>
    </button>

    <p class="login-recado" id="login-recado" data-erro="0">
      Use a conta que você quiser — ela só serve pra identificar seus posts no mural.
    </p>
  </div>

  <p class="login-rodape">Feito pela comunidade da Imersão Claude</p>
</main>

<script src="background.js"></script>
<script type="module" src="login.js"></script>
</body>
</html>
